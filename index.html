<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water - Every Drop Creates Change</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-card">
        <header class="navbar">
            <div class="nav-logo">
                <img src="img/cw_logo.png" alt="Charity Water Logo" class="logo-img">
            </div>
            <div class="nav-title">EVERY DROP CREATES CHANGE</div>
            <a href="#donate" class="nav-button">Join Us</a>
        </header>

        <section class="hero">
            <img src="img/Hero-water.png.jpg" alt="Hands holding clean water" class="hero-image">
        </section>

        <section class="main-content">
            <div class="content-left">
                <h2>Clean Water Changes<br>Everything</h2>
                <p>A small donation can help bring clean water to communities that need it the most.</p>
                <a href="#donate" class="donate-btn" id="donate">DONATE TODAY</a>
            </div>

            <div class="content-right">
                <img src="img/Water-Collection.png.jpeg" alt="People collecting clean water" class="small-image">
                <img src="img/Child-drinking.png.jpeg" alt="Person drinking clean water" class="small-image">
            </div>
        </section>
    </div>
</body>
</html>
